<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CABANA</title>
 <style>
  /* === Reset & Global ============================================ */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  html,
  body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: sans-serif;
    background: black;
  }

  /*Carregamento da pagina*/
  /* ===== Oculta tudo, exceto o loading ===== */
  body.loading > #loading-screen {
    display: flex !important;
  }

  body.loading > *:not(#loading-screen) {
    display: none !important;
  }

  /* Classe que dispara a animação: círculo encolhe até 0% no centro */
  #loading-screen.reveal {
    clip-path: circle(0% at 50% 50%);
  }

  /* ===== Loading Screen ===== */
  #loading-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background-color: white;
    padding: 20px;
    clip-path: circle(150% at 50% 50%);
    transition: clip-path 0.8s ease-in-out;
    background-image: url('https://i.servimg.com/u/f22/19/80/77/63/chatgp10.jpg');
    background-size: cover;
    no-repeat center center fixed;
    overflow-y: auto;
  }

  #drone-loader {
    width: 20vw;
    animation: shake 0.5s infinite alternate;
  }

  @keyframes shake {
    0%   { transform: translateX(-10px); }
    100% { transform: translateX(10px); }
  }

  #loading-text {
    margin-top: 20px;
    font-size: clamp(1rem, 4vw, 2rem);
    text-align: center;
    line-height: 1.35;
    color: #000;
  }

  #progress-container {
    width: 80%;
    height: 16px;
    background-color: #ddd;
    border-radius: 10px;
    margin: 30px auto;
    overflow: hidden;
  }

  #progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(to right, #ff00ff, #00ffff);
    transition: width 0.3s ease;
  }

  #progress-detail {
    font-size: 1rem;
    margin-top: 10px;
  }

  #start-button {
    font-size: 1rem;
    padding: 12px 24px;
    margin-top: 20px;
    border: none;
    color: black;
    font-weight: bold;
    cursor: pointer;
    border-radius: 10px;
    background: linear-gradient(to right, #ff00ff, #00ffff);
  }

  #start-button:hover {
    opacity: 0.9;
  }

  .janela-transparente {
    background-color: rgba(255, 255, 255, 0.9);
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8);
    width: min(92vw, 760px);
    max-width: 760px;
    margin: 0 auto;
  }

  #start-button {
    width: fit-content;
    max-width: 100%;
    white-space: normal;
  }

  @media (max-width: 768px) {
    #loading-screen {
      padding: 14px;
    }

    #drone-loader {
      width: min(40vw, 180px);
    }

    .janela-transparente {
      width: 92vw;
      padding: 14px;
    }
  }

  /* === Wrapper ================================================== */
  #app {
    position: relative;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }
   
   
   .live-cover123 {
  width: 100%;
  aspect-ratio: 16 / 9;

  background: url("https://i.servimg.com/u/f22/19/80/77/63/chatgp13.jpg") no-repeat center/cover;

  flex-shrink: 0;
}

  /* === Fundo Principal ========================================== */
  #background {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: url("https://i.servimg.com/u/f22/19/80/77/63/chatgp11.jpg") no-repeat center center;
    background-size: cover;
    transform-origin: center center;
    transition: transform 1s ease-in;
    z-index: 1;
  }

  /* === Overlay Gradiente ======================================== */
  #overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(
      to bottom,
      rgba(255,255,255,0) 0%,
      rgba(255,255,255,0.3) 50%,
      rgba(255,255,255,0) 100%
    );
    background-size: 100% 200%;
    animation: overlayMove 4s ease-in-out infinite;
    display: none;
    opacity: 0;
    pointer-events: none;
    transition: opacity .8s ease-in-out;
    z-index: 2;
  }
  @keyframes overlayMove {
    0%   { background-position: 0% 100%; }
    50%  { background-position: 0% 0%;   }
    100% { background-position: 0% 100%; }
  }

  /* === Login Container ========================================= */
  #login-container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    opacity: 1;
    transition: transform .8s ease, opacity .8s ease;
    z-index: 3;
  }
  #login-container.hidden {
    opacity: 0;
    transform: translate(-50%, -150%);
    pointer-events: none;
  }
  #login-container img {
    display: block;
    margin: 0 auto 30px;
    width: 50vw;
    max-width: 300px;
    height: auto;
    filter: drop-shadow(0 0 20px rgba(0,0,0,0.5));
  }

  /* === Botão Google ============================================= */
  .botao-chrome {
    display: inline-block;
    margin-top: 10px;
    padding: 8px 12px;
    width: 220px;
    font-size: 16px;
    font-weight: bold;
    text-transform: uppercase;
    color: black;
    background: linear-gradient(-45deg, #ff00ff, #00ffff, #ffff00);
    background-size: 600% 600%;
    animation: lava 8s ease infinite;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    z-index: 3;
  }

  /* === Pós-login Overlay & Screen2 ============================= */
  #post-login-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: white;  
    opacity: 1;
    transition: opacity 1.2s ease-in-out;
    pointer-events: none;
    z-index: 6;
  }
  #post-login-overlay.hidden {
    opacity: 0;
  }
  #screen2 {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: url("https://i.servimg.com/u/f22/19/80/77/63/chatgp12.jpg") no-repeat center center;
    background-size: cover;
    opacity: 0;
    transition: opacity 1s ease-in-out;
    pointer-events: none;
    z-index: 5;
  }
  #screen2.visible {
    opacity: 1;
    pointer-events: auto;
  }

  /* === Lava Animation for Buttons =============================== */
  @keyframes lava {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* === Botões Circulares Principais ============================== */
  .action-btn {
    position: absolute;
    width: 60px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    color: white;
    background: linear-gradient(-45deg, #ff00ff, #00ffff, #ffff00);
    background-size: 600% 600%;
    animation: lava 8s ease infinite;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    opacity: 0;
    transition: opacity .5s ease;
    pointer-events: none;
    z-index: 7;
  }
  .action-btn.visible {
    opacity: 1;
    pointer-events: auto;
  }
  #btn-cell   { top: 10%; left: 50%; transform: translateX(-50%); }
  #btn-lock1  { top: 30%; left: 60%; transform: translateX(-50%); }
  #btn-lock2  { top: 50%; left: 70%; transform: translateX(-50%); }

  /* === Float Animation for Action Buttons ======================= */
  @keyframes floatBtn {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50%      { transform: translateX(-50%) translateY(-10px); }
  }
  #btn-cell,
  #btn-lock1,
  #btn-lock2 {
    animation:
      floatBtn 3s ease-in-out infinite,
      lava     8s ease infinite;
  }

  /* === Celular Overlay + Conteúdo =============================== */
  #celular-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.7);
    z-index: 9;
  }
  #celular-content {
    position: relative;
    width: 90vw;
    max-width: 400px;
    height: 90vh;
    background: url("https://i.servimg.com/u/f22/19/80/77/63/celula10.png") no-repeat center center;
    background-size: contain;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  #close-celular {
    position: absolute;
    top: 5px;
    right: 10px;
    background: transparent;
    border: none;
    color: white;
    font-size: 24px;
    cursor: pointer;
    z-index: 10;
  }

  /* === Grade de Ícones ========================================== */
 #icon-grid {
  position: absolute;
  /* margens de 10% em cada lado para centralizar: */
  top: 20%;
  left: 20%;
  /* ocupa 80% da largura e da altura do contêiner pai */
  width: 60%;
  height: 60%;
  display: grid;
  grid-template-rows: auto repeat(4, 1fr);
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;

  background: rgba(0, 0, 0, 0.5);
  padding: 1rem;
  border-radius: 12px;

  opacity: 0;
  transition: opacity 0.5s ease;
  pointer-events: none;
  z-index: 11;
}
#icon-grid.visible {
  opacity: 1;
  pointer-events: auto;
}
#close-icon-grid {
  position: absolute;
  top: 5px;
  right: 5px;
  background: transparent;
  border: none;
  color: white;
  font-size: 24px;
  cursor: pointer;
  z-index: 12;
}
  .icon-button {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 60px;
  font-size: 14px;
  font-weight: bold;
  background: rgba(255, 255, 255, 0.8);
  border-radius: 12px;
  cursor: pointer;
  user-select: none;
  transition: background 0.3s ease;
}
.icon-button:hover {
  background: rgba(255, 255, 255, 1);
}
   
   #icon-grid .grid-title {
  /* ocupa todas as colunas */
  grid-column: 1 / -1;
  /* centraliza o texto */
  text-align: center;
  /* cor e tamanho */
  color: #fff;
  font-size: 1.2rem;
  font-weight: bold;
  /* dá um espacinho embaixo */
  margin-bottom: 0.5rem;
  /* se quiser adicionar sombra para contrastar */
  text-shadow: 0 0 4px rgba(0,0,0,0.7);
}
  

  /* === Geladeira Overlay ======================================== */
  #geladeira-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.7);
    z-index: 10;
  }
  #geladeira-content {
    position: relative;
    width: 90vw;
    max-width: 450px;
    height: 90vh;
    background: url("https://i.servimg.com/u/f22/19/80/77/63/gelade12.png") no-repeat center center;
    background-size: auto 100%;
  }
  #geladeira-text {
    position: relative;
    top: 10%;
    left: 5%;
    width: 90%;
    max-height: 80%;
    padding: 1rem;
    background: rgba(0,0,0,0.8);
    color: #fff;
    font-size: 14px;
    border-radius: 8px;
    overflow-y: auto;
  }
  #close-geladeira {
    position: absolute;
    top: 5px;
    right: 10px;
    background: transparent;
    border: none;
    color: white;
    font-size: 24px;
    cursor: pointer;
  }

  /* === Notificação de Curtida ==================================== */
  #notif-overlay {
    position: absolute;
    width: 60%;
    height: 60%;
    top: 20%;
    left: 20%;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.8);
    padding: 1rem;
    border-radius: 12px;
    box-sizing: border-box;
    overflow: hidden;
    z-index: 20;
  }
  #notif-overlay button#close-notif {
    position: absolute;
    top: 8px;
    right: 8px;
    background: transparent;
    border: none;
    font-size: 24px;
    color: #fff;
    cursor: pointer;
  }
  .gradient-wrapper {
    position: relative;
    width: 180px;
    height: 180px;
    margin-bottom: 1rem;
  }
  .gradient-border {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: conic-gradient(
      from 0deg,
      #37B5FF 0deg,
      #FE40BC 120deg,
      #FDCF17 240deg,
      #37B5FF 360deg
    );
    box-shadow: 0 0 20px rgba(255,255,255,0.3), 0 0 25px rgba(0,0,0,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    animation: spin-border 4s linear infinite, border-glow 4s ease-in-out infinite;
  }
  .inner-circle {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    overflow: hidden;
    animation: counter-rotate 4s linear infinite;
    box-shadow: inset 0 0 15px rgba(0,0,0,0.2);
  }
  .inner-circle img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  #notif-content {
    color: #fff;
    text-align: center;
    font-size: 0.9rem;
    line-height: 1.2;
    max-width: 90%;
    overflow-wrap: break-word;
  }
  @keyframes spin-border {
    to { transform: rotate(360deg); }
  }
  @keyframes border-glow {
    0%, 100% { box-shadow: 0 0 20px rgba(255,255,255,0.3), 0 0 25px rgba(0,0,0,0.1); }
    50%       { box-shadow: 0 0 40px rgba(255,255,255,0.6), 0 0 50px rgba(0,0,0,0.2); }
  }
  @keyframes counter-rotate {
    to { transform: rotate(-360deg); }
  }

  /* === Emojis de coração flutuantes ============================= */
  .heart-container {
    position: absolute;
    right: 10px;
    bottom: 10px;
    width: 2rem;
    height: 4rem;
    pointer-events: none;
  }
  .heart {
    position: absolute;
    font-size: 1.5rem;
    opacity: 0;
    animation: float-up 3s ease-in infinite;
  }
  .heart:nth-child(1) { animation-delay: 0s;    left: 0;   }
  .heart:nth-child(2) { animation-delay: 0.5s;  left: 10px;}
  .heart:nth-child(3) { animation-delay: 1s;    left:-10px;}
  @keyframes float-up {
    0%   { transform: translateY(0)    scale(0.5); opacity: 1;   }
    80%  { opacity: 0.6; }
    100% { transform: translateY(-100px) scale(1) translateX(10px); opacity: 0; }
  }

  /* === Responsivo =============================================== */
  @media (max-width: 400px) {
  .live-modal123 {
    width: 94vw;
    left: 50%;
    transform: translateX(-50%);
    max-height: calc(100dvh - 16px);
    height: auto;
  }
}
    
   
   /* container absoluto cobrindo a geladeira */
  #fruit-container {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    overflow: hidden;
    z-index: 15;
  }

.fruit {
  position: absolute;
  font-size: 2rem;
  will-change: top, opacity;

  /* parte de baixo do contêiner: */
  top: 100%;
  
  /* animação de subida relativa ao contêiner */
  animation: float-up-fruit 10s linear infinite;
  animation-fill-mode: backwards; /* garante top:100% durante o delay */
}

@keyframes float-up-fruit {
  0%   { top: 100%;  opacity: 1; }
  100% { top: -20%;  opacity: 0; }
}

/* === Labels para as áreas (cantos superiores) ================== */
.area-label {
  position: absolute;
  top: 12px;
  left: 12px;
  padding: 6px 10px;
  background: rgba(0,0,0,0.6);
  color: #fff;
  font-weight: bold;
  border-radius: 6px;
  z-index: 95;
  font-size: 14px;
  text-shadow: 0 0 4px rgba(0,0,0,0.6);
  pointer-events: none;
}

/* === Aviso na parte de baixo da segunda janela ================== */
#second-warning {
  position: absolute;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  max-width: 90%;
  background: rgba(255,255,255,0.9);
  color: #000; 
  padding: 12px 16px;
  border-radius: 8px;
  box-shadow: 0 6px 30px rgba(0,0,0,0.7);
  z-index: 96;
  font-size: 18px;
  display: none;
  text-align: center;

  /* animação suave */
  animation: floatHighlight 1.6s ease-in-out infinite;
}

@keyframes floatHighlight {
  0%   { transform: translateX(-50%) translateY(0); }
  50%  { transform: translateX(-50%) translateY(-6px); }
  100% { transform: translateX(-50%) translateY(0); }
}


/* === Estilo typing (texto do PC) ================================= */
#pc-typing {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%,-50%);
  font-family: "Courier New", Courier, monospace;
  font-size: 40px;
  color: #ffffff;
  background: rgba(0,0,0,0);
  z-index: 91;
  white-space: nowrap;
  overflow: hidden;
  border-right: 2px solid rgba(255,255,255,0.9);
  padding-right: 6px;
  letter-spacing: 1px;
  display: none;
}

/* efeito de digitação via width (ch) */
.pc-typing-run {
  display: inline-block;
  animation: typing 3s steps(32,end) 1 forwards, caret 0.7s step-end infinite;
  max-width: 40ch;
  box-sizing: content-box;
}
@keyframes typing {
  from { width: 0ch; }
  to   { width: 24ch; } /* ajusta conforme texto */
}
@keyframes caret {
  50% { border-color: transparent; }
  100% { border-color: rgba(255,255,255,0.9); }
}

/* pequena transição para o background quando dá zoom */
.bg-zooming {
  transition: transform 0.8s cubic-bezier(.2,.8,.2,1);
}

/* pequena classe para destacar o modal ao vivo (sombra e borda) */
.live-modal123 {
  position: fixed;

  width: 94vw;
  max-width: 420px;

  max-height: calc(100dvh - 24px);
  height: auto;

  left: 50%;
  top: 12px;
  transform: translateX(-50%);

  background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.02));
  background-color: rgba(8,8,10,0.75);
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.04);
  box-shadow: 0 18px 40px rgba(0,0,0,0.7);
  backdrop-filter: blur(6px) saturate(1.05);
  -webkit-backdrop-filter: blur(6px) saturate(1.05);

  display: flex;
  flex-direction: column;

  overflow: hidden;
  z-index: 999;
}

/* fechar grande/grosso */
.live-modal123 .close-btn123 {
  font-size: 26px !important;
  font-weight: 800 !important;
  width: 44px;
  height: 36px;
  border-radius: 6px;
  background: transparent;
  color: #fff;
  border: none;
  cursor: pointer;
}
   
   
   .live-modal-ajuda123 {
  position: fixed;
  background: transparent;
  isolation: isolate;
}

.live-modal-ajuda123::before {
  content: "";
  position: absolute;
  inset: 0;
  background: url("https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEg6PhsW3RXEv-sP2SQ2XO1k1MZMALuVNBFn5vTvwkldOuWovO8DJHJaXK-BTjh_FgTnxtJFxnPCJpmIF6Jc8FlBku2ZITPwA8-5WFe7O7uUGr81rLZ5nkV7rfIuakxtl1l5TPzta1yCnkxp7GueRjQiM3wD0BgNcUcNPeyCFqSh0oHDIpE557b8iL44wz8/s1600/fundologopreto.jpg") no-repeat center/cover;
  filter: blur(6px) brightness(0.75);
  transform: scale(1.08);
  transform-origin: center;
  z-index: 0;
}

.live-modal-ajuda123 > * {
  position: relative;
  z-index: 1;
}
   
   
   .live-loading-ajuda123 {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #141414;  /* escolha a cor do fundo */
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 1.2rem;
  font-weight: bold;
}


/* ===== EFEITO MONITOR ANTIGO (CRT) ===== */
.monitor-overlay{
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9999;
  background:
    repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0.12),
      rgba(0,0,0,0.12) 1px,
      transparent 2px,
      transparent 4px
    ),
    radial-gradient(
      ellipse at center,
      transparent 55%,
      rgba(0,0,0,0.18) 100%
    );
  animation: scanMove 10s linear infinite, flicker 3.2s infinite;
}

@keyframes scanMove{
  from { background-position: 0 0, center; }
  to   { background-position: 0 100%, center; }
}

@keyframes flicker{
  0%{opacity:.28}
  8%{opacity:.38}
  15%{opacity:.22}
  30%{opacity:.35}
  45%{opacity:.25}
  60%{opacity:.4}
  75%{opacity:.3}
  100%{opacity:.34}
}

   
   

  </style>
</head>
<body class="loading">
  <!-- Loading Screen -->
  <div id="loading-screen">
    <img id="drone-loader" src="https://i.servimg.com/u/f22/19/80/77/63/drone_10.png" alt="Drone">

    <div class="janela-transparente"><div id="loading-text">
      <span id="initial-message">VOCÊ SOLICITOU O ENVIO DE UM DRONE</span>
      <span id="final-message" hidden>
        O DRONE JÁ CHEGOU AO ACAMPAMENTO!
        <button id="start-button" style="display:block; margin:20px auto 0;">
          VER TRANSMISSÃO DO DRONE AO VIVO
        </button>
      </span>
    </div>

    const idbState = { db: null };
    function openGameIndexedDB() {
      if (idbState.db) return Promise.resolve(idbState.db);
      return new Promise((resolve, reject) => {
        const req = indexedDB.open("vinhadinho-local-db", 1);
        req.onupgradeneeded = () => {
          const db = req.result;
          if (!db.objectStoreNames.contains("gameData")) {
            db.createObjectStore("gameData", { keyPath: "id" });
          }
        };
        req.onsuccess = () => {
          idbState.db = req.result;
          resolve(idbState.db);
        };
        req.onerror = () => reject(req.error);
      });
    }

    function buildIndexedKey(type) {
      return `${GAME_NAME}:${GAME_MODE}:${type}`;
    }

    async function saveGameDataToIndexedDB(type, dados) {
      const db = await openGameIndexedDB();
      const id = buildIndexedKey(type);
      const payload = {
        id,
        jogo: GAME_NAME,
        modo: GAME_MODE,
        tipo: type,
        dados,
        updatedAt: Date.now()
      };
      return new Promise((resolve, reject) => {
        const tx = db.transaction("gameData", "readwrite");
        tx.objectStore("gameData").put(payload);
        tx.oncomplete = () => resolve(payload);
        tx.onerror = () => reject(tx.error);
      });
    }

    async function readGameDataFromIndexedDB(type) {
      const db = await openGameIndexedDB();
      const id = buildIndexedKey(type);
      return new Promise((resolve, reject) => {
        const tx = db.transaction("gameData", "readonly");
        const req = tx.objectStore("gameData").get(id);
        req.onsuccess = () => resolve(req.result || null);
        req.onerror = () => reject(req.error);
      });
    }


    const sharedKvState = { db: null };
    function openSharedKV() {
      if (sharedKvState.db) return Promise.resolve(sharedKvState.db);
      return new Promise((resolve, reject) => {
        const req = indexedDB.open("vinhadinho-shared-db", 1);
        req.onupgradeneeded = () => {
          const db = req.result;
          if (!db.objectStoreNames.contains("kv")) {
            db.createObjectStore("kv", { keyPath: "key" });
          }
        };
        req.onsuccess = () => {
          sharedKvState.db = req.result;
          resolve(sharedKvState.db);
        };
        req.onerror = () => reject(req.error);
      });
    }

    async function sharedKVGet(key) {
      const db = await openSharedKV();
      return new Promise((resolve, reject) => {
        const tx = db.transaction("kv", "readonly");
        const req = tx.objectStore("kv").get(key);
        req.onsuccess = () => resolve(req.result ? req.result.value : null);
        req.onerror = () => reject(req.error);
      });
    }

    async function sharedKVSet(key, value) {
      const db = await openSharedKV();
      return new Promise((resolve, reject) => {
        const tx = db.transaction("kv", "readwrite");
        tx.objectStore("kv").put({ key, value, updatedAt: Date.now() });
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });

      return new Date(y, m-1, d, h);
    }
    function formatDate(date) {
      const pad = n => n.toString().padStart(2,'0');
      return `${pad(date.getDate())}/${pad(date.getMonth()+1)} ${pad(date.getHours())}:${pad(date.getMinutes())}`;
    }

    // ========== Helper: controla visibilidade da seta (arrow-btn) ==========
    function setArrowVisibility(show) {
      // aplica imediatamente se existir
      const el = document.getElementById('arrow-btn');
      if (el) {
        if (show) el.classList.add('visible');
        else el.classList.remove('visible');
        return;
      }
      // se ainda não existe, observa #app por inserção e aplica apenas uma vez
      const app = document.getElementById('app');
      if (!app) return;
      const mo = new MutationObserver((mutations, observer) => {
        const el2 = document.getElementById('arrow-btn');
        if (el2) {
          if (show) el2.classList.add('visible');
          else el2.classList.remove('visible');
          observer.disconnect();
        }
      });
      mo.observe(app, { childList: true, subtree: true });
    }

    // ========== Login Google ==========

    // ========== Geladeira ==========
    btnLock2.addEventListener("click", async () => {
      const user = getSessionUser();
      if (!user) return alert("Você precisa fazer login primeiro.");
      const uid = user.uid;
      const key = `geladeira_${uid}`;
      let data = null, rawg = localStorage.getItem(key);
      if (rawg) {
        try {
          const c = JSON.parse(rawg);
          if (Date.now() - c.timestamp <= 5*60*1000) data = c.data;
        } catch {}
      }
      if (!data) {
        if (isMundoGamerMode()) {
          try {
            const registro = await readGameDataFromIndexedDB("geladeira");
            data = registro?.dados || {};
            await saveGameDataToIndexedDB("geladeira", data);
            localStorage.setItem(key, JSON.stringify({ timestamp:Date.now(), data }));
          } catch {
            return alert("Não foi possível carregar as frutas locais.");
          }
        } else {
          try {
            const snap = await firebase.database().ref(`users/${uid}/frutas`).once("value");
            data = snap.val() || {};
            localStorage.setItem(key, JSON.stringify({ timestamp:Date.now(), data }));
            await saveGameDataToIndexedDB("geladeira", data);
          } catch {
            return alert("Não foi possível carregar as frutas.");
          }
        }
      }
      renderGeladeira(data);
      geladeiraOverlay.style.display = "flex";    // 1. exibe o overlay
      startFruitAnimation(data);                   // 2. só então dispara a animação
    });

    function renderGeladeira(frutas) {
      let html = "";
      if (Array.isArray(frutas)) {
        frutas.forEach((f,i) => html += `<p><strong>${i+1}.</strong> ${f.nome}: ${f.quantidade}</p>`);
      } else {
        for (const[k,f] of Object.entries(frutas)) {
          if (f && typeof f==="object") html += `<p><strong>${k}:</strong> ${f.nome||""} — ${f.quantidade||""}</p>`;
          else html += `<p><strong>${k}:</strong> ${f}</p>`;
        }
      }
      geladeiraText.innerHTML = html||"<p>A geladeira de vinhadinho está completamente vazia.<br><br> Vinhadinho usa a geladeira para preservar os vegetais que ele coletou e declarado para federação. <br><br>A federação do vale fiscaliza e mantem uma lista pública do conteúdo da geladeira de todos os cidadãos<br><br> A fiscalização e controle existe para evitar que a misteriosa doença se espalhe pelos alimentos.<br><br>Depois da grande doença e a queda dos governos, essa ação é totalmente necessária e aceita por todos os cidadãos</p>";
    }

    function startFruitAnimation(frutas) {
      const container = document.getElementById('fruit-container');
      container.innerHTML = '';

     // calcula quantas frutas de cada tipo
    const mapping = {
      banana:    { emoji: '\u{1F34C}', qty: 0 }, 
      berinjela: { emoji: '\u{1F346}', qty: 0 }, 
      cenoura:   { emoji: '\u{1F955}', qty: 0 }, 
      pepino:    { emoji: '\u{1F952}', qty: 0 }, 
      pessego:   { emoji: '\u{1F351}', qty: 0 }  
    };
      for (const [rawName, amount] of Object.entries(frutas)) {
        const nomeNorm = rawName
          .toLowerCase()
          .normalize('NFD')
          .replace(/[\u0300-\u036f]/g, '')
          .replace(/\s+/g, '');
        if (mapping[nomeNorm]) {
          mapping[nomeNorm].qty = Math.floor(amount / 10);
        }
      }

      // Gera todas as frutas de uma vez
      for (const { emoji, qty } of Object.values(mapping)) {
        for (let i = 0; i < qty; i++) {
          const span = document.createElement('span');
          span.classList.add('fruit');
          span.textContent = emoji;
          // posição horizontal aleatória
          span.style.left = (10 + Math.random() * 80) + '%';
          span.style.animationDelay = (Math.random() * 10) + 's';
          container.appendChild(span);
        }
      }
    }

    closeGeladeira.addEventListener("click", () => geladeiraOverlay.style.display="none");
    geladeiraOverlay.addEventListener("click", e => { if(e.target===geladeiraOverlay) geladeiraOverlay.style.display="none"; });
  </script>

<script>
(() => {
  const screen     = document.getElementById('loading-screen');
  const initM      = document.getElementById('initial-message');
  const finalM     = document.getElementById('final-message');
  const container  = document.getElementById('progress-container');
  const detail     = document.getElementById('progress-detail');
  const bar        = document.getElementById('progress-bar');
  const startBtn   = document.getElementById('start-button');

  const imgMap     = { planta1: "https://via.placeholder.com/50", planta2: "https://via.placeholder.com/50" };
  const characters = [ { img: "https://via.placeholder.com/100" } ];
  const TSV_URL    = "https://jsonplaceholder.typicode.com/posts";

  function preloadImage(src) {
    return new Promise(res => {
      const img = new Image();
      img.onload  = res;
      img.onerror = res;
      img.src     = src;
    });
  }

  function delay(ms) {
    return new Promise(res => setTimeout(res, ms));
  }

  const steps = [
    { text: 'Carregando imagens do drone ao vivo…', load: () => preloadImage('https://i.servimg.com/u/f22/19/80/77/63/drone_10.png') },
    { text: 'Carregando sprites de plantas…',       load: () => Promise.all(Object.values(imgMap).map(preloadImage)) },
    { text: 'Carregando personagens iniciais…',     load: () => preloadImage(characters[0].img) },
    { text: 'Procurando moradores e cabanas…',      load: () => fetch(TSV_URL).then(r => r.text()) }
  ];
  const total = steps.length;

  async function runLoading() {
    initM.hidden = false;
    finalM.hidden = true;
    container.style.display = 'block';
    detail.style.display = 'block';
    bar.style.width = '0%';

    detail.textContent = 'Preparando voo do drone…';
    await delay(7000);

    for (let i = 0; i < total; i++) {
      detail.textContent = steps[i].text;
      try { await steps[i].load(); } catch {}
      bar.style.width = `${((i + 1) / total) * 100}%`;
    }

    container.style.display = 'none';
    detail.style.display = 'none';

    initM.hidden = true;
    finalM.hidden = false;
  }

  startBtn.addEventListener('click', () => {
    document.body.classList.remove('loading');

    requestAnimationFrame(() => {
      screen.classList.add('reveal');
    });

    screen.addEventListener('transitionend', () => {
      screen.style.display = 'none';
    }, { once: true });
  });

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', runLoading);
  } else {
    runLoading();
  }
})();
</script>

<script>
(function () {
  const STORAGE_KEY = 'statusanuncio';
  const BUTTON_SELECTOR = '#doaranuncio'; // botão dentro do modal (AJUDAR)
  
  /* ============================
     Helpers de localStorage
     ============================ */
  function getStatus() {
    try {
      const v = localStorage.getItem(STORAGE_KEY);
      return v === 's' ? 's' : 'n';
    } catch (e) {
      return 'n';
    }
  }

  function setStatus(val) {
    try {
      localStorage.setItem(STORAGE_KEY, val === 's' ? 's' : 'n');
      // atualiza visuais sempre que salvar
      updateButtonVisuals();
      return true;
    } catch (e) {
      return false;
    }
  }

  /* ============================
     Atualiza texto/estilo do botão #doaranuncio (APENAS este)
     ============================ */
  function updateButtonVisuals() {
    const status = getStatus();
    const modalBtn = document.querySelector(BUTTON_SELECTOR);
    if (!modalBtn) return; // se ainda não existe, nada a fazer

    if (status === 's') {
      modalBtn.textContent = 'CANCELAR SUA AJUDA';
      modalBtn.style.background = '#cc0000'; // vermelho escudo
      modalBtn.style.color = '#fff';
      modalBtn.style.animation = 'none';
      modalBtn.style.border = '1px solid rgba(0,0,0,0.2)';
    } else {
      modalBtn.textContent = 'AJUDAR';
      modalBtn.style.background = 'linear-gradient(-45deg,#ff00ff,#00ffff,#ffff00)';
      modalBtn.style.backgroundSize = '600% 600%';
      // tenta restaurar a animação caso exista (usa o nome que você já usa: lava123)
      modalBtn.style.animation = 'lava123 8s ease infinite';
      modalBtn.style.color = '#000';
      modalBtn.style.border = 'none';
    }
  }

  /* ============================
     Modal (criação/remoção)
     ============================ */
  function removeModal() {
    const existing = document.querySelector('._anuncio_modal_overlay');
    if (existing) existing.remove();
    document.removeEventListener('keydown', _handleKeyDown);
  }

  function _handleKeyDown(e) {
    if (e.key === 'Escape') removeModal();
  }

  function showModal(options = {}) {
    removeModal();

    const overlay = document.createElement('div');
    overlay.className = '_anuncio_modal_overlay';
    overlay.style.position = 'fixed';
    overlay.style.inset = '0';
    overlay.style.background = 'rgba(0,0,0,0.75)';
    overlay.style.display = 'flex';
    overlay.style.alignItems = 'center';
    overlay.style.justifyContent = 'center';
    overlay.style.zIndex = '99999';

    const box = document.createElement('div');
    box.className = '_anuncio_modal';
    box.style.maxWidth = '420px';
    box.style.width = 'calc(100% - 40px)';
    box.style.background = 'rgba(20,20,20,0.95)';
    box.style.color = '#fff';
    box.style.padding = '18px';
    box.style.borderRadius = '10px';
    box.style.boxShadow = '0 8px 30px rgba(0,0,0,0.5)';
    box.style.fontFamily = 'system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial';
    box.style.textAlign = 'left';

    const p = document.createElement('p');
    p.style.margin = '0 0 14px 0';
    p.style.lineHeight = '1.4';
    p.style.fontSize = '15px';
    p.textContent = options.message || '';
    box.appendChild(p);

    const actions = document.createElement('div');
    actions.className = '_anuncio_actions';
    actions.style.display = 'flex';
    actions.style.gap = '10px';
    actions.style.justifyContent = 'flex-end';
    actions.style.flexWrap = 'wrap';

    const okBtn = document.createElement('button');
    okBtn.type = 'button';
    okBtn.className = '_anuncio_btn _anuncio_btn_ok';
    okBtn.textContent = 'X';
    okBtn.style.cursor = 'pointer';
    okBtn.style.border = 'none';
    okBtn.style.padding = '8px 12px';
    okBtn.style.borderRadius = '8px';
    okBtn.style.fontSize = '14px';
    okBtn.style.background = 'transparent';
    okBtn.style.border = '1px solid rgba(255,255,255,0.15)';
    okBtn.style.color = '#fff';

    okBtn.addEventListener('click', () => {
      removeModal();
      if (typeof options.onClose === 'function') options.onClose();
    });

    actions.appendChild(okBtn);

    if (options.primaryLabel) {
      const primaryBtn = document.createElement('button');
      primaryBtn.type = 'button';
      primaryBtn.className = '_anuncio_btn _anuncio_btn_toggle';
      if (options.primaryId) primaryBtn.id = options.primaryId; // permite definir #doaranuncio
      primaryBtn.textContent = options.primaryLabel;
      primaryBtn.style.cursor = 'pointer';
      primaryBtn.style.border = 'none';
      primaryBtn.style.padding = '8px 12px';
      primaryBtn.style.borderRadius = '8px';
      primaryBtn.style.fontSize = '14px';
      primaryBtn.style.background = 'linear-gradient(-45deg,#ff00ff,#00ffff,#ffff00)';
      primaryBtn.style.backgroundSize = '600% 600%';
      primaryBtn.style.animation = 'lava123 8s ease infinite';
      primaryBtn.style.color = '#111';

      primaryBtn.addEventListener('click', () => {
        if (typeof options.primaryAction === 'function') options.primaryAction();
      });

      actions.appendChild(primaryBtn);
    }
    box.appendChild(actions);
    overlay.appendChild(box);
    document.body.appendChild(overlay);

    // após inserir, atualiza visual do botão (se for #doaranuncio)
    updateButtonVisuals();

    overlay.addEventListener('click', (ev) => {
      if (ev.target === overlay) {
        removeModal();
        if (typeof options.onClose === 'function') options.onClose();
      }
    });

    okBtn.focus();
    document.addEventListener('keydown', _handleKeyDown);
  }

  function showQuickMessage(text) {
    showModal({
      message: text
    });
  }

  /* ============================
     Lógica do clique (separada para reuso)
     ============================ */
  function onDoarAnuncioClick(e) {
    if (e && typeof e.preventDefault === 'function') e.preventDefault();
    const status = getStatus();

    if (status === 's') {
      showModal({
        message:
          'Atualmente os anúncios já estão ativos e devem aparecer conforme você joga entre os modos de jogo, dessa forma vinhadinho receberá a sua ajuda.',
        primaryLabel: 'Desativar anúncios',
        primaryAction: function () {
          const ok = setStatus('n');
          removeModal();
          if (ok) {
            showQuickMessage(
              'Os anúncios foram desativados. Sentiremos falta da sua contribuição! Lembre-se que cada visualização faz a diferença para a nossa causa comunitária. Se mudar de ideia, basta reativá-los a qualquer momento.'
            );
          } else {
            showQuickMessage(
              'Não foi possível salvar sua preferência (localStorage indisponível).'
            );
          }
        }
      });
    } else {
      showModal({
        message:
          'Você está prestes a ativar os anúncios. Eles serão exibidos discretamente no canto da tela durante a partida, e toda a receita gerada será contabilizada como doação comunitária. Acompanhe o progresso em Verificar Meta. ',
        primaryLabel: 'Ativar anúncios',
        primaryAction: function () {
          const ok = setStatus('s');
          removeModal();
          if (ok) {
            showQuickMessage(
              'Anúncios ativados! O Vinhadinho agora receberá sua ajuda conforme eles forem exibidos durante a partida. Vale lembrar: as propagandas são geridas por uma empresa terceirizada, por isso, recomendamos que você não forneça informações pessoais ao interagir com elas'
            );
          } else {
            showQuickMessage(
              'Não foi possível salvar sua preferência (localStorage indisponível).'
            );
          }
        }
      });
    }
  }

  /* ============================
     Event delegation (escuta clicks no botão modal quando existir)
     ============================ */
  function delegatedHandler(e) {
    const btn = e.target.closest && e.target.closest(BUTTON_SELECTOR);
    if (!btn) return;
    onDoarAnuncioClick(e);
  }

  /* ============================
     Observador para detectar criação de #doaranuncio
     ============================ */
  const mo = new MutationObserver((mutations) => {
    for (const m of mutations) {
      for (const node of m.addedNodes) {
        if (!(node instanceof Element)) continue;
        if (node.matches && node.matches(BUTTON_SELECTOR)) {
          updateButtonVisuals();
        } else {
          const found = node.querySelector && node.querySelector(BUTTON_SELECTOR);
          if (found) updateButtonVisuals();
        }
      }
    }
  });

  /* ============================
     Inicialização
     ============================ */
  function init() {
    document.addEventListener('click', delegatedHandler);
    mo.observe(document.body, { childList: true, subtree: true });

    // atualiza visual inicial caso o botão já exista
    updateButtonVisuals();

    // liga listener direto (se o botão já estiver no DOM)
    const directBtn = document.querySelector(BUTTON_SELECTOR);
    if (directBtn && !directBtn._anuncio_listener_installed) {
      directBtn.addEventListener('click', onDoarAnuncioClick);
      directBtn._anuncio_listener_installed = true;
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

  // export para debug
  window._anuncio = {
    getStatus,
    setStatus,
    showModal,
    removeModal,
  };

  // desconecta observer ao sair da página
  window.addEventListener('beforeunload', () => {
    try { mo.disconnect(); } catch (e) {}
  });
})();
</script>

let isMax = false;

btnMax.addEventListener("click", () => {
  isMax = !isMax;

  if (isMax) {
    root.classList.add("maximized");
    document.documentElement.style.overflow = "hidden";

  } else {

    // ícone ◻ (restaurar)

    // --- fallback (quando iframe não carregar / bloqueado por X-Frame-Options) ---
    let loaded = false;
    function onLoad() {
      loaded = true;
      fallback.classList.remove("show");
      fallback.setAttribute("aria-hidden", "true");
    }
    iframe.addEventListener("load", onLoad);

    const localFallbackTimer = setTimeout(() => {
      if (!loaded) {
        fallback.classList.add("show");
        fallback.setAttribute("aria-hidden", "false");
      }
    }, IFRAME_LOAD_TIMEOUT);

    retryBtn.addEventListener("click", () => {
      try {
        fallback.classList.remove("show");
        fallback.setAttribute("aria-hidden", "true");
        // força reload com cache-buster
        iframe.src = selectedLink + (selectedLink.indexOf('?') === -1 ? '?' : '&') + 'cb=' + Date.now();
        loaded = false;
        clearTimeout(window._anuncioRetryTimer);
        window._anuncioRetryTimer = setTimeout(() => {
          if (!loaded) {
            fallback.classList.add("show");
            fallback.setAttribute("aria-hidden", "false");
          }
        }, IFRAME_LOAD_TIMEOUT);
      } catch (e) {
        console.warn(e);
      }
    });

    // --- abrir em nova aba (já tem href) ---
    openLink.addEventListener("click", () => {
      // nada extra necessário; href já aponta para selectedLink
    });

    // --- fechar (remove e agenda próximo) ---
    let removed = false;
    function closeAndSchedule() {
      if (removed) return;
      removed = true;
      try {
        root.classList.remove("show");
        setTimeout(()=> {
          try { root.remove(); } catch(e){}
          if (mgr.currentRoot === root) mgr.currentRoot = null;
        }, 360);
      } catch(e){}
      // limpeza de listeners/timers
      iframe.removeEventListener("load", onLoad);
      clearTimeout(localFallbackTimer);

      // restaura scroll se maximizado
      document.documentElement.style.overflow = "";
      document.body.style.overflow = "";

      // agenda novo anúncio (apenas se localStorage ainda permitir)
      scheduleNext();
    }

    btnClose.addEventListener("click", closeAndSchedule);

    // fechar com ESC
    function onKey(e) {
      if (e.key === "Escape") {
        closeAndSchedule();
      }
    }
    document.addEventListener("keydown", onKey);

    // cleanup quando remove do DOM
    const obs = new MutationObserver(() => {
      if (!document.body.contains(root)) {
        document.removeEventListener("keydown", onKey);
        iframe.removeEventListener("load", onLoad);
        obs.disconnect();
      }
    });
    obs.observe(document.body, { childList: true });

    // retorna handle
    return {
      close: closeAndSchedule,
      root
    };
  }

  // --- Agenda exibição do próximo anúncio considerando localStorage ---
  function scheduleNext() {
    // cancela timer anterior se houver
    if (mgr.timerId) { clearTimeout(mgr.timerId); mgr.timerId = null; }

    // escolhe delay aleatório
    const delay = randDelay();
    mgr.timerId = setTimeout(() => {
      mgr.timerId = null;
      try {
        if (!canShow()) {
          // se foi desabilitado, não agendar novamente; mas podemos tentar de novo
          // com outro delay só se desejar — aqui escolhemos não reapresentar até que a página seja recarregada
          return;
        }
        // antes de criar, assegura que não existe outro root
        if (document.getElementById("anuncio-toast-root")) return;
        const selectedLink = pickLink();
        createAdInstance(selectedLink);
      } catch (e) {
        console.warn("Erro ao tentar mostrar anúncio:", e);
      }
    }, delay);
  }

  // --- Inicialização: somente agenda se localStorage permitir ---
  try {
    if (!canShow()) {
      // não mostra nada
      return;
    }
  } catch (e) {
    // se houver erro no acesso, aborta
    return;
  }

  // agendar primeiro anúncio com delay aleatório
  scheduleNext();

  // --- expor util no window para debug (opcional) ---
  window._anuncioManager = mgr;
  window._anuncioManager.scheduleNext = scheduleNext;
  window._anuncioManager.cancel = () => {
    if (mgr.timerId) { clearTimeout(mgr.timerId); mgr.timerId = null; }
    if (mgr.currentRoot && document.body.contains(mgr.currentRoot)) {
      try { mgr.currentRoot.remove(); } catch(e) {}
      mgr.currentRoot = null;
    }
  };

})();
</script>

  <script>
    (() => {
  const canvas = document.getElementById("mouse-pixels");
  const ctx = canvas.getContext("2d");

  canvas.style.position = "fixed";
  canvas.style.inset = "0";
  canvas.style.pointerEvents = "none";
  canvas.style.zIndex = "9998";
  canvas.style.imageRendering = "pixelated";

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener("resize", resize);
  resize();

  const pixels = [];
  const MAX = 220;

  let mouse = { x: 0, y: 0, vx: 0, vy: 0 };
  let last = { x: 0, y: 0 };

  window.addEventListener("mousemove", e => {
    mouse.vx = e.clientX - last.x;
    mouse.vy = e.clientY - last.y;
    mouse.x = e.clientX;
    mouse.y = e.clientY;
    last.x = mouse.x;
    last.y = mouse.y;

    spawn(mouse.x, mouse.y, mouse.vx, mouse.vy);
  });

  function spawn(x, y, vx, vy) {
    if (pixels.length > MAX) pixels.shift();

    const size = 4 + Math.random() * 4;

    pixels.push({
      x,
      y,
      vx: vx * 0.04 + (Math.random() - 0.5),
      vy: vy * 0.04 + (Math.random() - 0.5),
      life: 1,
      size
    });
  }

  function update() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let i = pixels.length - 1; i >= 0; i--) {
      const p = pixels[i];

      p.x += p.vx;
      p.y += p.vy;
      p.life -= 0.02;
      p.vx *= 0.92;
      p.vy *= 0.92;

      if (p.life <= 0) {
        pixels.splice(i, 1);
        continue;
      }

      ctx.globalAlpha = p.life;
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(
        Math.round(p.x / 2) * 2,
        Math.round(p.y / 2) * 2,
        p.size,
        p.size
      );
    }

    ctx.globalAlpha = 1;
    requestAnimationFrame(update);
  }

  update();
})();

  </script>

<script>
(async () => {
  const host = window.location.hostname;
  const isGooglePages = host === 'versaodeluxe18.github.io' || host.endsWith('.github.io');

  if (!isGooglePages) return;

  const sourceUrl = 'https://versaodeluxe18.github.io/vinhadinho/game/modo-dev.html';

  try {
    const response = await fetch(sourceUrl, { cache: 'no-store' });
    if (!response.ok) throw new Error(`Falha ao carregar HTML: ${response.status}`);

    const html = await response.text();
    const parsed = new DOMParser().parseFromString(html, 'text/html');
    const scripts = parsed.querySelectorAll('script');

    for (const original of scripts) {
      const script = document.createElement('script');

      for (const attr of original.attributes) {
        script.setAttribute(attr.name, attr.value);
      }

      if (!original.src) {
        script.textContent = original.textContent;
      }

      document.head.appendChild(script);
    }
  } catch (error) {
    console.error('Erro ao importar scripts do modo-dev.html:', error);
  }
})();
</script>
