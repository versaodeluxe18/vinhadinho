<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Projeto Vinhadinho - Intro</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100%; /* Mudado de height para min-height */
            background-color: black;
            display: flex;
            justify-content: center;
            /* Removido o align-items: center daqui para evitar o corte no topo */
            overflow-x: hidden;
            overflow-y: auto;
            font-family: 'Press Start 2P', cursive;
        }

        #container {
            text-align: center;
            width: min(94vw, 980px);
            /* O margin: auto vertical garante a centralização sem cortar o topo */
            margin: 60px auto; 
            padding: 20px 16px 60px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .title-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            text-align: center;
        }

        #title {
            color: white;
            font-size: 24px;
            margin-bottom: 50px;
            border-right: 4px solid white;
            white-space: nowrap;
            overflow: hidden;
            width: 0;
            display: inline-block;
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 20px;
            opacity: 0;
            transition: opacity 1s ease-in;
        }

        /* --- Estilo da Animação do Painel --- */
        .production-panel {
            /* Em vez de display: none, usamos visibilidade e opacidade para animar */
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            
            margin-top: 35px;
            color: white;
            width: 100%;
            max-width: 860px;
            box-sizing: border-box;
            pointer-events: none; /* Impede clicar enquanto invisível */
        }

        /* Classe que será adicionada via JS */
        .production-panel.active {
            max-height: 2000px; /* Valor alto para permitir expansão */
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
            margin-top: 50px;
        }

        .server-status-wrapper {
            margin-top: 34px;
            border: 2px solid white;
            padding: 18px;
            box-sizing: border-box;
            background: rgba(255, 255, 255, 0.02);
        }

        .status-title {
            margin: 0 0 16px;
            font-size: 12px;
            letter-spacing: 1px;
            text-align: center;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            border: 2px solid white;
            padding: 10px 12px;
            margin-bottom: 10px;
            font-size: 10px;
            text-align: left;
        }

        .status-row:last-of-type {
            margin-bottom: 0;
        }

        .label {
            color: white;
        }

        .online { color: #61ff90; }
        .offline { color: #ff6b6b; }
        .checking { color: #ffe66d; }

        .failure-messages {
            margin-top: 16px;
            border: 2px solid #ff6b6b;
            padding: 14px;
            text-align: left;
            font-size: 10px;
            line-height: 1.8;
            background: rgba(255, 60, 60, 0.08);
            display: none;
        }

        .failure-messages.visible {
            display: block;
        }

        .warning-text {
            color: #ff6b6b;
        }

        button {
            background: transparent;
            color: white;
            border: 2px solid white;
            padding: 15px 30px;
            font-family: 'Press Start 2P', cursive;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            background: white;
            color: black;
            transform: scale(1.1);
        }

        @keyframes blink {
            50% { border-color: transparent; }
        }

        .anim-cursor {
            animation: blink 0.8s step-end infinite;
        }

        @media (max-width: 640px) {
            #title { font-size: 16px; }
            button { font-size: 11px; }
        }
    </style>
</head>
<body>

    <div id="container">
        <div class="title-wrapper">
            <h1 id="title"></h1>
        </div>
        
        <div class="menu" id="main-menu">
            <button onclick="jogar()">JOGAR</button>
            <button onclick="repositorio()">INFORMAÇAO</button>
        </div>

        <section class="production-panel" id="production-panel">
            <h2 style="font-size: 18px; margin-bottom: 24px;">STATUS DO SERVIDOR</h2>

            <div class="server-status-wrapper">
                <h3 class="status-title">STATUS DO SERVIDOR</h3>

                <div class="status-row">
                    <span class="label">BLOGGER:</span>
                    <span id="status-blogger" class="checking">Escaneando...</span>
                </div>

                <div class="status-row">
                    <span class="label">FORUMEIROS:</span>
                    <span id="status-forum" class="checking">Escaneando...</span>
                </div>

                <div class="status-row">
                    <span class="label">GITHUB:</span>
                    <span id="status-github" class="checking">Escaneando...</span>
                </div>

            </div>

            <div id="failure-messages" class="failure-messages" aria-live="polite"></div>
        </section>
    </div>

    <script>
        const text = "PROJETO VINHADINHO";
        const BLOGGER_URL = "https://vinhadinho.blogspot.com/favicon.ico";
        const FORUM_URL = "https://versaodeluxe.directorioforuns.com/favicon.ico";
        const GITHUB_API = "https://www.githubstatus.com/api/v2/status.json";

        const titleElement = document.getElementById('title');
        const menu = document.getElementById('main-menu');
        const productionPanel = document.getElementById('production-panel');
        const failureMessagesElement = document.getElementById('failure-messages');
        let index = 0;
        let statusVerificado = false;

        let statusMap = {
            blogger: false,
            forum: false,
            github: false
        };

        let checksConcluidos = {
            blogger: false,
            forum: false,
            github: false
        };

        function typeWriter() {
            if (index < text.length) {
                titleElement.innerHTML += text.charAt(index);
                index++;
                titleElement.style.width = (index * 1.05) + "em"; 
                setTimeout(typeWriter, 100); 
            } else {
                titleElement.classList.add('anim-cursor');
                showMenu();
            }
        }

        function showMenu() {
            menu.style.opacity = "1";
        }

        function jogar() {
            window.location.href = "https://versaodeluxe18.github.io/vinhadinho/game/Inicio.html";
        }

        function repositorio() {
            // Agora apenas adicionamos a classe que contém a animação CSS
            productionPanel.classList.add('active');

            if (!statusVerificado) {
                verificarTudo();
                statusVerificado = true;
            }
            
            // Scroll suave para mostrar o conteúdo novo
            setTimeout(() => {
                productionPanel.scrollIntoView({ behavior: 'smooth' });
            }, 300);
        }

        function verificarTudo() {
            checksConcluidos = { blogger: false, forum: false, github: false };
            verificarSite(BLOGGER_URL, 'status-blogger', 'blogger');
            verificarSite(FORUM_URL, 'status-forum', 'forum');
            verificarGitHub();
        }

        function verificarSite(url, elementId, key) {
            const el = document.getElementById(elementId);
            const img = new Image();
            img.src = url + "?t=" + Date.now();

            img.onload = () => {
                el.innerHTML = "● ONLINE";
                el.className = "online";
                statusMap[key] = true;
                checksConcluidos[key] = true;
                atualizarMensagensFalha();
            };

            img.onerror = () => {
                el.innerHTML = "○ OFFLINE";
                el.className = "offline";
                statusMap[key] = false;
                checksConcluidos[key] = true;
                atualizarMensagensFalha();
            };
        }

        function verificarGitHub() {
            const el = document.getElementById("status-github");
            fetch(GITHUB_API)
                .then(response => response.json())
                .then(data => {
                    if (data.status.indicator === "none") {
                        el.innerHTML = "● ONLINE";
                        el.className = "online";
                        statusMap.github = true;
                    } else {
                        el.innerHTML = "○ INSTÁVEL";
                        el.className = "offline";
                        statusMap.github = false;
                    }
                    checksConcluidos.github = true;
                    atualizarMensagensFalha();
                })
                .catch(() => {
                    el.innerHTML = "○ SEM RESPOSTA";
                    el.className = "offline";
                    statusMap.github = false;
                    checksConcluidos.github = true;
                    atualizarMensagensFalha();
                });
        }

        function atualizarMensagensFalha() {
            const terminou = checksConcluidos.blogger && checksConcluidos.forum && checksConcluidos.github;
            if (!terminou) return;

            const mensagens = [];

            if (!statusMap.github) {
                mensagens.push("<span class='warning-text'>[LOG DE ERRO GITHUB]:</span> Instabilidade detectada na infraestrutura de repositórios. Isso compromete a execução de arquivos de som/imagem e resulta em perda total de acesso à versão de testes (PBE).");
            }

            if (!statusMap.blogger) {
                mensagens.push("<span class='warning-text'>[FALHA DE ATIVOS BLOGGER]:</span> Servidor de banco de mídia offline. Falha crítica detectada no carregamento de imagens, sons e na integração do sistema de Marketplace e NFT.");
            }

            if (!statusMap.forum) {
                mensagens.push("<span class='warning-text'>[MANUTENÇÃO FORUMEIROS]:</span> O ambiente de produção e o suporte comunitário estão inacessíveis. Integradora externa apresentando latência crítica ou modo de manutenção.");
            }

            if (mensagens.length === 0) {
                failureMessagesElement.innerHTML = "";
                failureMessagesElement.classList.remove("visible");
                return;
            }

            failureMessagesElement.innerHTML = mensagens.join("<br><br>");
            failureMessagesElement.classList.add("visible");
        }

        window.onload = typeWriter;
    </script>

    <canvas id="mouse-pixels"></canvas>
    <script>
        (() => {
            const canvas = document.getElementById("mouse-pixels");
            const ctx = canvas.getContext("2d");
            canvas.style.position = "fixed";
            canvas.style.inset = "0";
            canvas.style.pointerEvents = "none";
            canvas.style.zIndex = "9998";
            canvas.style.imageRendering = "pixelated";

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener("resize", resize);
            resize();

            const pixels = [];
            const MAX = 220;
            let mouse = { x: 0, y: 0, vx: 0, vy: 0 };
            let last = { x: 0, y: 0 };

            window.addEventListener("mousemove", e => {
                mouse.vx = e.clientX - last.x;
                mouse.vy = e.clientY - last.y;
                mouse.x = e.clientX;
                mouse.y = e.clientY;
                last.x = mouse.x;
                last.y = mouse.y;
                spawn(mouse.x, mouse.y, mouse.vx, mouse.vy);
            });

            function spawn(x, y, vx, vy) {
                if (pixels.length > MAX) pixels.shift();
                const size = 4 + Math.random() * 4;
                pixels.push({
                    x, y,
                    vx: vx * 0.04 + (Math.random() - 0.5),
                    vy: vy * 0.04 + (Math.random() - 0.5),
                    life: 1,
                    size
                });
            }

            function update() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let i = pixels.length - 1; i >= 0; i--) {
                    const p = pixels[i];
                    p.x += p.vx; p.y += p.vy;
                    p.life -= 0.02;
                    p.vx *= 0.92; p.vy *= 0.92;
                    if (p.life <= 0) { pixels.splice(i, 1); continue; }
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = "#ffffff";
                    ctx.fillRect(Math.round(p.x / 2) * 2, Math.round(p.y / 2) * 2, p.size, p.size);
                }
                requestAnimationFrame(update);
            }
            update();
        })();
    </script>
</body>
</html>
